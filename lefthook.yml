pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo fmt --all --check
    clippy:
      run: cargo clippy --workspace --all-targets -- -D warnings

commit-msg:
  commands:
    dco:
      run: "rg -q '^Signed-off-by: .+ <.+>$' {1}"

pre-push:
  commands:
    test:
      run: cargo test --workspace
